<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUNKIDS App Demo</title>
    <!-- 載入必要函式庫 (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
          const [activeTab, setActiveTab] = React.useState('home');
          const [loading, setLoading] = React.useState(true);

          React.useEffect(() => {
            const timer = setTimeout(() => setLoading(false), 1200);
            return () => clearTimeout(timer);
          }, []);

          // 當分頁切換時，重新初始化 Lucide 圖示
          React.useEffect(() => {
            if (!loading) lucide.createIcons();
          }, [activeTab, loading]);

          const colors = {
            primary: '#FF8E72',
            bg: '#FFFDF9',
            text: '#2D3436'
          };

          if (loading) {
            return (
              <div className="flex items-center justify-center h-screen bg-[#FFFDF9] max-w-md mx-auto shadow-2xl">
                <div className="text-center">
                  <div className="w-16 h-16 border-4 border-[#FF8E72] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                  <p className="text-[#FF8E72] font-black tracking-widest">FUNKIDS</p>
                  <p className="text-gray-400 text-xs mt-2">系統載入中...</p>
                </div>
              </div>
            );
          }

          return (
            <div className="max-w-md mx-auto h-screen bg-[#FFFDF9] shadow-2xl flex flex-col relative overflow-hidden">
              {/* 手機狀態列 */}
              <div className="px-6 pt-4 flex justify-between items-center text-[10px] font-black text-gray-400">
                <span>9:41</span>
                <div className="flex gap-1.5 items-center">
                  <i data-lucide="signal" className="w-3 h-3"></i>
                  <i data-lucide="wifi" className="w-3 h-3"></i>
                  <i data-lucide="battery" className="w-4 h-4"></i>
                </div>
              </div>

              {/* 頂部導航 */}
              <header className="px-6 py-4 flex justify-between items-center bg-[#FFFDF9] z-10">
                <div>
                  <h1 className="text-2xl font-black tracking-tighter text-[#FF8E72]">FUNKIDS</h1>
                  <p className="text-[10px] text-gray-400 font-bold uppercase tracking-tight">Parenting Management</p>
                </div>
                <div className="flex gap-3">
                  <button className="p-2 bg-white rounded-full shadow-sm border border-gray-100">
                    <i data-lucide="bell" className="w-5 h-5 text-gray-600"></i>
                  </button>
                  <div className="w-10 h-10 rounded-full bg-orange-100 border-2 border-white shadow-sm overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Amy" alt="Avatar" />
                  </div>
                </div>
              </header>

              {/* 主要視圖區域 */}
              <main className="flex-1 overflow-y-auto px-6 pb-28 no-scrollbar">
                {activeTab === 'home' && <HomeView />}
                {activeTab === 'manage' && <ManageView />}
                {activeTab === 'store' && <StoreView />}
                {activeTab === 'wallet' && <WalletView />}
              </main>

              {/* 底部導航 */}
              <nav className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 px-6 py-4 flex justify-between items-center z-20">
                <NavBtn id="home" icon="home" label="首頁" active={activeTab} set={setActiveTab} />
                <NavBtn id="manage" icon="layout-dashboard" label="管理" active={activeTab} set={setActiveTab} />
                <NavBtn id="store" icon="store" label="市場" active={activeTab} set={setActiveTab} />
                <NavBtn id="wallet" icon="wallet" label="帳務" active={activeTab} set={setActiveTab} />
                <NavBtn id="profile" icon="user" label="我的" active={activeTab} set={setActiveTab} />
              </nav>
            </div>
          );
        };

        const HomeView = () => (
          <div className="space-y-6 pt-2 animate-in fade-in duration-500">
            <div className="bg-gradient-to-br from-[#FF8E72] to-[#ffb09c] p-6 rounded-[2.5rem] text-white shadow-xl shadow-orange-100">
              <p className="opacity-80 text-xs font-bold mb-1">HELLO, AMY</p>
              <h2 className="text-3xl font-black mb-4">$12,450</h2>
              <div className="flex justify-between items-center">
                <span className="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">本月佣金收益</span>
                <div className="flex items-center gap-1 text-[10px] font-bold">
                  <i data-lucide="trending-up" className="w-3 h-3"></i> +12%
                </div>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div className="bg-white p-5 rounded-3xl border border-gray-50 shadow-sm">
                <i data-lucide="calendar" className="w-5 h-5 text-[#FF8E72] mb-3"></i>
                <p className="text-[10px] text-gray-400 font-black uppercase">本月活動</p>
                <p className="text-xl font-black">5 檔</p>
              </div>
              <div className="bg-white p-5 rounded-3xl border border-gray-50 shadow-sm">
                <i data-lucide="clock" className="w-5 h-5 text-blue-400 mb-3"></i>
                <p className="text-[10px] text-gray-400 font-black uppercase">待收款項</p>
                <p className="text-xl font-black">3 筆</p>
              </div>
            </div>

            <section>
              <div className="flex justify-between items-end mb-4">
                <h3 className="font-black text-gray-800">熱門推廣項目</h3>
                <span className="text-[10px] font-bold text-[#FF8E72]">查看更多</span>
              </div>
              <div className="space-y-4">
                <ActivityCard title="兒童夏日藝術工坊" date="07.15" rate="15%" hot />
                <ActivityCard title="森林探險營隊" date="08.01" rate="20%" />
              </div>
            </section>
          </div>
        );

        const ManageView = () => (
          <div className="space-y-4 pt-2">
            <h3 className="font-black text-xl mb-4 text-gray-800">活動進度管理</h3>
            {[1, 2, 3].map(i => (
              <div key={i} className="bg-white p-4 rounded-3xl border border-gray-50 shadow-sm flex gap-4">
                <div className="w-16 h-16 bg-gray-100 rounded-2xl overflow-hidden shrink-0">
                  <img src={`https://picsum.photos/seed/fun${i}/200`} className="w-full h-full object-cover" />
                </div>
                <div className="flex-1">
                  <h4 className="font-bold text-sm text-gray-800">小小烘焙家體驗營</h4>
                  <div className="flex justify-between items-center mt-2 mb-1">
                    <span className="text-[10px] text-gray-400 font-bold">報名人數: 12/20</span>
                    <span className="text-[10px] text-[#FF8E72] font-bold">60%</span>
                  </div>
                  <div className="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                    <div className="bg-[#FF8E72] h-full" style={{width: '60%'}}></div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        );

        const StoreView = () => (
          <div className="space-y-5 pt-2">
            <div className="bg-gray-100 rounded-2xl px-4 py-3 flex items-center gap-3">
              <i data-lucide="search" className="w-4 h-4 text-gray-400"></i>
              <span className="text-gray-400 text-sm font-medium">搜尋高品質廠商與活動...</span>
            </div>
            <div className="grid grid-cols-2 gap-4">
              {[1, 2, 3, 4, 5, 6].map(i => (
                <div key={i} className="bg-white rounded-[2rem] overflow-hidden border border-gray-50 shadow-sm">
                  <img src={`https://picsum.photos/seed/store${i}/300/200`} className="w-full h-28 object-cover" />
                  <div className="p-4">
                    <p className="font-bold text-xs truncate">品牌廠商活動</p>
                    <div className="flex justify-between items-center mt-2">
                        <span className="text-[#FF8E72] font-black text-[10px]">分潤 20%</span>
                        <i data-lucide="plus-circle" className="w-4 h-4 text-[#FF8E72]"></i>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );

        const WalletView = () => (
          <div className="pt-2">
            <div className="text-center py-10">
              <p className="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-2">可提領總額</p>
              <h2 className="text-5xl font-black text-gray-800">$8,200</h2>
              <button className="mt-8 bg-[#FF8E72] text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-orange-100 hover:scale-105 transition">立即提領</button>
            </div>
            <div className="mt-4">
                <h4 className="font-black text-gray-800 mb-4">近期收支</h4>
                <div className="space-y-4">
                    <div className="flex justify-between items-center p-4 bg-white rounded-2xl border border-gray-50">
                        <div>
                            <p className="font-bold text-sm">藝術工坊分潤</p>
                            <p className="text-[10px] text-gray-400 mt-1">今天 14:30</p>
                        </div>
                        <p className="font-black text-green-500">+$3,200</p>
                    </div>
                </div>
            </div>
          </div>
        );

        // UI 組件
        const NavBtn = ({ id, icon, label, active, set }) => (
          <button onClick={() => set(id)} className="flex flex-col items-center gap-1.5 transition-all">
            <i data-lucide={icon} className={`w-6 h-6 transition-colors ${active === id ? 'text-[#FF8E72]' : 'text-gray-300'}`}></i>
            <span className={`text-[10px] font-black tracking-tight transition-colors ${active === id ? 'text-[#FF8E72]' : 'text-gray-300'}`}>{label}</span>
          </button>
        );

        const ActivityCard = ({ title, date, rate, hot }) => (
          <div className="bg-white p-5 rounded-3xl border border-gray-50 shadow-sm flex justify-between items-center">
            <div>
              <h4 className="font-black text-sm text-gray-800 mb-1">{title}</h4>
              <p className="text-[10px] text-gray-400 font-bold">{date} • 佣金分潤 {rate}</p>
            </div>
            {hot && <span className="bg-orange-50 text-[#FF8E72] text-[9px] font-black px-2.5 py-1 rounded-full">熱門</span>}
          </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
