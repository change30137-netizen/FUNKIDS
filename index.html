<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUNKIDS 家長端 App Demo</title>
    <!-- 載入必要函式庫 (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            overscroll-behavior: none;
            background-color: #f3f4f6;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .app-container {
            height: 100vh;
            height: 100dvh; 
        }
        .active-tab { color: #FF8E72; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
          const [activeTab, setActiveTab] = React.useState('home');
          const [loading, setLoading] = React.useState(true);

          React.useEffect(() => {
            const timer = setTimeout(() => setLoading(false), 1200);
            return () => clearTimeout(timer);
          }, []);

          React.useEffect(() => {
            if (!loading) {
              lucide.createIcons();
            }
          }, [activeTab, loading]);

          if (loading) {
            return (
              <div className="flex items-center justify-center app-container bg-[#FFFDF9] max-w-md mx-auto shadow-2xl">
                <div className="text-center">
                  <div className="w-20 h-20 border-4 border-[#FF8E72] border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                  <h1 className="text-[#FF8E72] font-black text-2xl tracking-widest">FUNKIDS</h1>
                  <p className="text-gray-400 text-sm mt-2 font-bold">為您的孩子開啟精彩生活</p>
                </div>
              </div>
            );
          }

          return (
            <div className="max-w-md mx-auto app-container bg-[#FFFDF9] shadow-2xl flex flex-col relative overflow-hidden">
              
              {/* 頂部搜尋與 Logo */}
              <header className="px-6 pt-10 pb-4 bg-[#FFFDF9] z-10">
                <div className="flex justify-between items-center mb-4">
                  <h1 className="text-2xl font-black tracking-tighter text-[#FF8E72]">FUNKIDS</h1>
                  <div className="flex gap-3">
                    <button className="p-2 bg-gray-50 rounded-full active:scale-90 transition">
                      <i data-lucide="bell" className="w-5 h-5 text-gray-500"></i>
                    </button>
                    <button className="p-2 bg-gray-50 rounded-full active:scale-90 transition">
                      <i data-lucide="heart" className="w-5 h-5 text-gray-500"></i>
                    </button>
                  </div>
                </div>
                <div className="relative group">
                  <i data-lucide="search" className="absolute left-4 top-3.5 w-5 h-5 text-gray-400"></i>
                  <input 
                    type="text" 
                    placeholder="想帶孩子去哪裡玩？" 
                    className="w-full bg-gray-100 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF8E72] transition-all"
                  />
                </div>
              </header>

              {/* 主要視圖內容區 */}
              <main className="flex-1 overflow-y-auto px-6 pb-28 no-scrollbar">
                {activeTab === 'home' && <CustomerHome />}
                {activeTab === 'explore' && <ExploreView />}
                {activeTab === 'orders' && <OrdersView />}
                {activeTab === 'profile' && <ProfileView />}
              </main>

              {/* 底部導航選單 (家長端) */}
              <nav className="bg-white/95 backdrop-blur-md border-t border-gray-100 px-6 pt-4 pb-8 flex justify-between items-center z-20">
                <NavBtn id="home" icon="home" label="首頁" active={activeTab} set={setActiveTab} />
                <NavBtn id="explore" icon="compass" label="探索" active={activeTab} set={setActiveTab} />
                <NavBtn id="orders" icon="shopping-bag" label="訂單" active={activeTab} set={setActiveTab} />
                <NavBtn id="profile" icon="user" label="我的" active={activeTab} set={setActiveTab} />
              </nav>
            </div>
          );
        };

        // --- 家長首頁視圖 ---
        const CustomerHome = () => (
          <div className="space-y-8 pt-2 animate-in fade-in duration-500">
            {/* 快速分類 */}
            <div className="grid grid-cols-4 gap-4">
              <CategoryBtn icon="utensils" label="食" color="bg-orange-100" text="text-orange-500" />
              <CategoryBtn icon="shirt" label="衣" color="bg-blue-100" text="text-blue-500" />
              <CategoryBtn icon="home" label="住" color="bg-green-100" text="text-green-500" />
              <CategoryBtn icon="car" label="行" color="bg-purple-100" text="text-purple-500" />
              <CategoryBtn icon="graduation-cap" label="育" color="bg-yellow-100" text="text-yellow-500" />
              <CategoryBtn icon="palmtree" label="樂" color="bg-pink-100" text="text-pink-500" />
              <CategoryBtn icon="ticket" label="票券" color="bg-cyan-100" text="text-cyan-500" />
              <CategoryBtn icon="more-horizontal" label="更多" color="bg-gray-100" text="text-gray-500" />
            </div>

            {/* 廣告 Banner */}
            <div className="bg-gradient-to-br from-[#FF8E72] to-[#ffb09c] rounded-[2.5rem] p-6 text-white shadow-xl relative overflow-hidden">
                <div className="relative z-10">
                    <p className="text-[10px] font-black tracking-widest uppercase mb-1">特別推薦</p>
                    <h2 className="text-xl font-black mb-2">夏季水上冒險營</h2>
                    <p className="text-xs opacity-90 mb-4 leading-relaxed">專業教練帶領，讓孩子在清涼中挑戰自我！</p>
                    <button className="bg-white text-[#FF8E72] px-6 py-2 rounded-full font-black text-xs shadow-lg">立即探索</button>
                </div>
                <i data-lucide="waves" className="absolute -right-4 -bottom-4 w-32 h-32 opacity-20 transform rotate-12"></i>
            </div>

            {/* 精選活動 */}
            <section className="pb-4">
              <div className="flex justify-between items-end mb-4 px-1">
                <h3 className="font-black text-gray-800 text-lg">大家都在玩</h3>
                <span className="text-xs font-bold text-[#FF8E72]">查看更多</span>
              </div>
              <div className="grid grid-cols-1 gap-6">
                <ActivityCard 
                  img="https://picsum.photos/seed/art/400/250"
                  title="兒童夏日藝術工坊" 
                  location="台北市 信義區"
                  price="800"
                  tag="藝術教育"
                />
                <ActivityCard 
                  img="https://picsum.photos/seed/forest/400/250"
                  title="小小森林探險隊" 
                  location="宜蘭縣 礁溪鄉"
                  price="1,200"
                  tag="戶外探索"
                />
              </div>
            </section>
          </div>
        );

        // --- 探索視圖 ---
        const ExploreView = () => (
          <div className="space-y-6 pt-2 animate-in fade-in duration-300">
            <h3 className="font-black text-xl text-gray-800">依分類探索</h3>
            <div className="space-y-4">
               {['熱門推薦', '本週活動', '室內靜態', '戶外體能'].map(cat => (
                 <div key={cat} className="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm flex justify-between items-center active:bg-gray-50 transition">
                    <span className="font-bold text-gray-700">{cat}</span>
                    <i data-lucide="chevron-right" className="text-gray-300 w-5 h-5"></i>
                 </div>
               ))}
            </div>
          </div>
        );

        // --- 訂單視圖 ---
        const OrdersView = () => (
          <div className="space-y-6 pt-2 animate-in fade-in duration-300">
            <h3 className="font-black text-xl text-gray-800">我的訂單</h3>
            <div className="flex gap-4 mb-4 border-b border-gray-100">
                <button className="pb-3 border-b-2 border-[#FF8E72] text-[#FF8E72] font-black text-sm">即將開始</button>
                <button className="pb-3 text-gray-400 font-bold text-sm">已完成</button>
                <button className="pb-3 text-gray-400 font-bold text-sm">已取消</button>
            </div>
            
            <div className="space-y-4">
               <div className="bg-white p-5 rounded-3xl border border-gray-50 shadow-sm">
                  <div className="flex justify-between items-start mb-4">
                    <h4 className="font-black text-gray-800">小小烘焙家體驗營</h4>
                    <span className="text-[10px] font-black px-2 py-1 bg-green-50 text-green-500 rounded-lg">預約成功</span>
                  </div>
                  <div className="flex items-center gap-3 text-xs text-gray-400 mb-4">
                    <i data-lucide="calendar" className="w-4 h-4"></i> 2026.04.12 (日) 14:00
                  </div>
                  <button className="w-full py-3 bg-gray-50 text-gray-600 rounded-2xl font-bold text-sm border border-gray-100 active:bg-gray-100">查看電子票券</button>
               </div>
            </div>
          </div>
        );

        // --- 個人視圖 ---
        const ProfileView = () => (
          <div className="pt-2 animate-in fade-in duration-300 text-center">
             <div className="w-24 h-24 rounded-full bg-orange-50 border-4 border-white shadow-lg mx-auto mb-4 overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Parent" alt="Avatar" />
             </div>
             <h3 className="text-xl font-black text-gray-800">家長 曉明</h3>
             <p className="text-gray-400 text-xs font-bold mt-1">專屬點數：1,250 P</p>

             <div className="grid grid-cols-2 gap-4 mt-8">
                <div className="bg-white p-5 rounded-3xl border border-gray-50 shadow-sm">
                   <i data-lucide="heart" className="w-6 h-6 text-red-400 mx-auto mb-2"></i>
                   <p className="text-xs font-bold text-gray-500">我的收藏</p>
                </div>
                <div className="bg-white p-5 rounded-3xl border border-gray-50 shadow-sm">
                   <i data-lucide="ticket" className="w-6 h-6 text-orange-400 mx-auto mb-2"></i>
                   <p className="text-xs font-bold text-gray-500">優惠券</p>
                </div>
             </div>

             <div className="mt-8 space-y-2">
                <ProfileItem icon="settings" label="設定" />
                <ProfileItem icon="help-circle" label="幫助與支援" />
                <ProfileItem icon="log-out" label="登出" color="text-red-400" />
             </div>
          </div>
        );

        // --- UI 組件 ---

        const NavBtn = ({ id, icon, label, active, set }) => (
          <button onClick={() => set(id)} className="flex flex-col items-center gap-1.5 transition-all outline-none">
            <i data-lucide={icon} className={`w-6 h-6 transition-all duration-300 ${active === id ? 'text-[#FF8E72] scale-110' : 'text-gray-300'}`}></i>
            <span className={`text-[10px] font-black tracking-tight transition-colors duration-300 ${active === id ? 'text-[#FF8E72]' : 'text-gray-300'}`}>{label}</span>
          </button>
        );

        const CategoryBtn = ({ icon, label, color, text }) => (
            <div className="flex flex-col items-center gap-2 active:scale-90 transition cursor-pointer">
                <div className={`w-12 h-12 ${color} ${text} rounded-2xl flex items-center justify-center shadow-sm`}>
                    <i data-lucide={icon} className="w-6 h-6"></i>
                </div>
                <span className="text-[10px] font-black text-gray-500">{label}</span>
            </div>
        );

        const ActivityCard = ({ img, title, location, price, tag }) => (
            <div className="bg-white rounded-[2.5rem] overflow-hidden border border-gray-50 shadow-sm active:scale-[0.98] transition group">
                <div className="h-48 relative overflow-hidden">
                    <img src={img} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt={title} />
                    <div className="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full">
                        <span className="text-[10px] font-black text-[#FF8E72]">{tag}</span>
                    </div>
                </div>
                <div className="p-6">
                    <h4 className="font-black text-lg text-gray-800 mb-2">{title}</h4>
                    <div className="flex justify-between items-center">
                        <div className="flex items-center gap-1 text-gray-400 text-xs">
                            <i data-lucide="map-pin" className="w-3 h-3"></i> {location}
                        </div>
                        <div className="text-[#FF8E72] font-black">
                            <span className="text-xs">TWD</span> <span className="text-xl">{price}</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        const ProfileItem = ({ icon, label, color = "text-gray-600" }) => (
            <div className={`flex justify-between items-center p-5 bg-white rounded-3xl border border-gray-50 active:bg-gray-50 transition cursor-pointer`}>
                <div className="flex items-center gap-4">
                    <i data-lucide={icon} className={`w-5 h-5 ${color}`}></i>
                    <span className={`font-bold text-sm ${color}`}>{label}</span>
                </div>
                <i data-lucide="chevron-right" className="text-gray-300 w-4 h-4"></i>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
